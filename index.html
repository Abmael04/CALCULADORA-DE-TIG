                                                {showMath ? <ChevronUp className="w-4 h-4 text-emerald-600" /> : <ChevronDown className="w-4 h-4 text-emerald-600" />}
                                            </button>
                                            
                                            {showMath && (
                                                <div className="p-5 bg-white text-xs font-mono text-slate-600 space-y-4 border-t border-slate-200 overflow-x-auto">
                                                    {/* SEÇÃO 1: TIG */}
                                                    <h4 className="font-bold text-emerald-900 flex items-center gap-1"><Activity className="w-4 h-4 text-emerald-600" /> Cálculos da TIG</h4>
                                                    {form.calcMode === 'forward' ? (
                                                        <>
                                                            <div>
                                                                <p className="font-bold text-slate-800 mb-1">1. Massa de Glicose (mg)</p>
                                                                <p className="text-[10px] text-slate-400 mb-1">= (Vol Base x {cBase}mg/ml) + (Vol G50% x 500mg/ml)</p>
                                                                <p className="bg-slate-50 p-2 rounded border border-slate-100">= ({results.calcBase} x {cBase}) + ({results.calcG50} x 500) = <strong className="text-emerald-700">{results.glucoseMass.toFixed(0)} mg</strong></p>
                                                            </div>
                                                            <div>
                                                                <p className="font-bold text-slate-800 mb-1">2. Volume Total (ml)</p>
                                                                <p className="text-[10px] text-slate-400 mb-1">= Vol Base + Vol G50% + Eletrólitos</p>
                                                                <p className="bg-slate-50 p-2 rounded border border-slate-100">= {results.calcBase} + {results.calcG50} + {results.vElec} = <strong className="text-emerald-700">{results.totalVolume.toFixed(1)} ml</strong></p>
                                                            </div>
                                                            <div>
                                                                <p className="font-bold text-slate-800 mb-1">3. Concentração (mg/ml)</p>
                                                                <p className="text-[10px] text-slate-400 mb-1">= Massa / Volume Total</p>
                                                                <p className="bg-slate-50 p-2 rounded border border-slate-100">= {results.glucoseMass.toFixed(0)} / {results.totalVolume.toFixed(1)} = <strong className="text-emerald-700">{results.concentration.toFixed(2)} mg/ml</strong></p>
                                                            </div>
                                                            <div>
                                                                <p className="font-bold text-slate-800 mb-1">4. TIG (mg/kg/min)</p>
                                                                <p className="text-[10px] text-slate-400 mb-1">= (Concentração x Velocidade) / (Peso x 60 min)</p>
                                                                <p className="bg-slate-50 p-2 rounded border border-slate-100">= ({results.concentration.toFixed(2)} x {form.rate || 0}) / ({form.weight} x 60) = <strong className="text-emerald-700">{results.tig.toFixed(2)}</strong></p>
                                                            </div>
                                                        </>
                                                    ) : (
                                                        <>
                                                            <div>
                                                                <p className="font-bold text-slate-800 mb-1">1. Concentração Alvo Necessária (mg/ml)</p>
                                                                <p className="text-[10px] text-slate-400 mb-1">= (TIG Alvo x Peso x 60) / Velocidade</p>
                                                                <p className="bg-slate-50 p-2 rounded border border-slate-100">= ({form.targetTig} x {form.weight} x 60) / {form.rate || 1} = <strong className="text-teal-700">{results.targetConc.toFixed(2)} mg/ml</strong></p>
                                                            </div>
                                                            <div>
                                                                <p className="font-bold text-slate-800 mb-1">2. Massa Total Alvo (mg)</p>
                                                                <p className="text-[10px] text-slate-400 mb-1">= Concentração Alvo x Volume Total</p>
                                                                <p className="bg-slate-50 p-2 rounded border border-slate-100">= {results.targetConc.toFixed(2)} x {results.totalVolume} = <strong className="text-teal-700">{((results.targetConc * results.totalVolume)).toFixed(0)} mg</strong></p>
                                                            </div>
                                                            <div>
                                                                <p className="font-bold text-slate-800 mb-1">3. Volume Restante p/ Glicose (ml)</p>
                                                                <p className="text-[10px] text-slate-400 mb-1">= Volume Total - Eletrólitos</p>
                                                                <p className="bg-slate-50 p-2 rounded border border-slate-100">= {results.totalVolume} - {results.vElec} = <strong className="text-teal-700">{results.vRem.toFixed(1)} ml</strong></p>
                                                            </div>
                                                            <div>
                                                                <p className="font-bold text-slate-800 mb-1">4. Álgebra: Encontrar Volume de G50%</p>
                                                                <p className="text-[10px] text-slate-400 mb-1">= (Massa Total - (Vol Restante x Conc. Base)) / (500 - Conc. Base)</p>
                                                                <p className="bg-slate-50 p-2 rounded border border-slate-100">= ({((results.targetConc * results.totalVolume)).toFixed(0)} - ({results.vRem.toFixed(1)} x {cBase})) / (500 - {cBase}) = <strong className="text-teal-700">{results.calcG50.toFixed(2)} ml</strong></p>
                                                            </div>
                                                            <div>
                                                                <p className="font-bold text-slate-800 mb-1">5. Volume da Solução Base ({baseLabel})</p>
                                                                <p className="text-[10px] text-slate-400 mb-1">= Volume Restante - Vol G50%</p>
                                                                <p className="bg-slate-50 p-2 rounded border border-slate-100">= {results.vRem.toFixed(1)} - {results.calcG50.toFixed(2)} = <strong className="text-teal-700">{results.calcBase.toFixed(2)} ml</strong></p>
                                                            </div>
                                                        </>
                                                    )}

                                                    {/* SEÇÃO 2: ELETRÓLITOS */}
                                                    {(parseFloat(form.rate) > 0) && (
                                                    <div className="mt-6 pt-4 border-t border-slate-200 space-y-4">
                                                        <h4 className="font-bold text-emerald-900 flex items-center gap-1"><ShieldAlert className="w-4 h-4 text-emerald-600" /> Físico-Química e Segurança</h4>
                                                        
                                                        <div className="mb-2">
                                                            <p className="font-bold text-slate-700 mb-1">A. Osmolaridade da Bolsa (mOsm/L)</p>
                                                            <p className="text-[10px] text-slate-400 mb-1">Cálculo Exato Baseado nas Bulas (Total mOsm / Volume Total)</p>
                                                            <p className="bg-slate-50 p-2 rounded border border-slate-100 text-[10px] leading-relaxed">
                                                                mOsm = (Base x {baseOsmMath}) + (G50% x 2,775) + (NaCl10% x 3,422) + (KCl10% x 2,682) + (Ca10% x 0,683) + (NaCl0,9% x 0,308)<br/>
                                                                = <strong className="text-emerald-700 text-xs">{e.osmolarity.toFixed(0)} mOsm/L</strong>
                                                            </p>
                                                        </div>

                                                        <div className="mb-2">
                                                            <p className="font-bold text-slate-700 mb-1">B. Duração da Infusão e Fator Diário</p>
                                                            <p className="text-[10px] text-slate-400 mb-1">Tempo (h) = Vol Total / Velocidade</p>
                                                            <p className="bg-slate-50 p-2 rounded border border-slate-100">= {results.totalVolume.toFixed(1)} / {form.rate} = <strong className="text-slate-700">{duracaoHoras.toFixed(1)} horas</strong></p>
                                                            <p className="text-[10px] text-slate-400 mt-1 mb-1">Multiplicador Diário = 24h / Tempo</p>
                                                            <p className="bg-slate-50 p-2 rounded border border-slate-100">= 24 / {duracaoHoras.toFixed(1)} = <strong className="text-slate-700">{multiplicadorDiario.toFixed(2)}</strong></p>
                                                        </div>

                                                        {parseFloat(form.volKcl) > 0 && (
                                                        <div className="mb-2">
                                                            <p className="font-bold text-slate-700 mb-1">C. Potássio (KCl 10%)</p>
                                                            {refUnit === 'mEq' ? (
                                                                <>
                                                                    <p className="text-[10px] text-slate-400 mb-1">mEq K = Vol KCl x 1,34 mEq/mL</p>
                                                                    <p className="bg-slate-50 p-2 rounded border border-slate-100">= {form.volKcl} x 1,34 = <strong>{(form.volKcl * 1.34).toFixed(2)} mEq</strong></p>
                                                                    
                                                                    <p className="text-[10px] text-slate-400 mt-1 mb-1">Taxa Infusão (mEq/kg/h) = (mEq K / Tempo) / Peso</p>
                                                                    <p className="bg-slate-50 p-2 rounded border border-slate-100">= ({(form.volKcl * 1.34).toFixed(2)} / {duracaoHoras.toFixed(1)}) / {form.weight} = <strong className="text-slate-700">{e.k_rate.toFixed(2)} mEq/kg/h</strong></p>
                                                                    
                                                                    <p className="text-[10px] text-slate-400 mt-1 mb-1">Oferta (mEq/kg/dia) = (mEq K * Mult. Diário) / Peso</p>
                                                                    <p className="bg-slate-50 p-2 rounded border border-slate-100">= ({(form.volKcl * 1.34).toFixed(2)} * {multiplicadorDiario.toFixed(2)}) / {form.weight} = <strong className="text-slate-700">{e.k_day.toFixed(2)} mEq/kg/dia</strong></p>
                                                                </>
                                                            ) : (
                                                                <>
                                                                    <p className="text-[10px] text-slate-400 mb-1">mg KCl = Vol KCl x 100 mg/mL</p>
                                                                    <p className="bg-slate-50 p-2 rounded border border-slate-100">= {form.volKcl} x 100 = <strong>{(form.volKcl * 100).toFixed(0)} mg</strong></p>
                                                                    
                                                                    <p className="text-[10px] text-slate-400 mt-1 mb-1">Taxa Infusão (mg/kg/h) = (mg KCl / Tempo) / Peso</p>
                                                                    <p className="bg-slate-50 p-2 rounded border border-slate-100">= ({(form.volKcl * 100).toFixed(0)} / {duracaoHoras.toFixed(1)}) / {form.weight} = <strong className="text-slate-700">{e.k_mg_rate.toFixed(1)} mg/kg/h</strong></p>
                                                                    
                                                                    <p className="text-[10px] text-slate-400 mt-1 mb-1">Oferta (mg/kg/dia) = (mg KCl * Mult. Diário) / Peso</p>
                                                                    <p className="bg-slate-50 p-2 rounded border border-slate-100">= ({(form.volKcl * 100).toFixed(0)} * {multiplicadorDiario.toFixed(2)}) / {form.weight} = <strong className="text-slate-700">{e.k_mg_day.toFixed(0)} mg/kg/dia</strong></p>
                                                                </>
                                                            )}
                                                        </div>
                                                        )}

                                                        {(parseFloat(form.volNacl) > 0 || parseFloat(form.volNacl09) > 0 || form.baseSolutionType === 'SF09') && (
                                                        <div className="mb-2">
                                                            <p className="font-bold text-slate-700 mb-1">D. Sódio Total</p>
                                                            {refUnit === 'mEq' ? (
                                                                <>
                                                                    <p className="text-[10px] text-slate-400 mb-1">mEq Na = (NaCl 10% x 1,7) + (NaCl 0,9% x 0,154) + (Base SF 0,9% x 0,154)</p>
                                                                    <p className="bg-slate-50 p-2 rounded border border-slate-100">= ({parseFloat(form.volNacl || 0)} x 1,7) + ({parseFloat(form.volNacl09 || 0)} x 0,154) + ({form.baseSolutionType === 'SF09' ? results.calcBase.toFixed(2) : 0} x 0,154) = <strong>{((parseFloat(form.volNacl || 0) * 1.7) + (parseFloat(form.volNacl09 || 0) * 0.154) + (form.baseSolutionType === 'SF09' ? results.calcBase * 0.154 : 0)).toFixed(2)} mEq</strong></p>
                                                                    
                                                                    <p className="text-[10px] text-slate-400 mt-1 mb-1">Oferta (mEq/kg/dia) = (mEq Na * Mult. Diário) / Peso</p>
                                                                    <p className="bg-slate-50 p-2 rounded border border-slate-100">= ({((parseFloat(form.volNacl || 0) * 1.7) + (parseFloat(form.volNacl09 || 0) * 0.154) + (form.baseSolutionType === 'SF09' ? results.calcBase * 0.154 : 0)).toFixed(2)} * {multiplicadorDiario.toFixed(2)}) / {form.weight} = <strong className="text-slate-700">{e.na_day.toFixed(2)} mEq/kg/dia</strong></p>
                                                                </>
                                                            ) : (
                                                                <>
                                                                    <p className="text-[10px] text-slate-400 mb-1">mg NaCl = (NaCl 10% x 100) + (NaCl 0,9% x 9) + (Base SF 0,9% x 9)</p>
                                                                    <p className="bg-slate-50 p-2 rounded border border-slate-100">= ({parseFloat(form.volNacl || 0)} x 100) + ({parseFloat(form.volNacl09 || 0)} x 9) + ({form.baseSolutionType === 'SF09' ? results.calcBase.toFixed(2) : 0} x 9) = <strong>{((parseFloat(form.volNacl || 0) * 100) + (parseFloat(form.volNacl09 || 0) * 9) + (form.baseSolutionType === 'SF09' ? results.calcBase * 9 : 0)).toFixed(0)} mg</strong></p>
                                                                    
                                                                    <p className="text-[10px] text-slate-400 mt-1 mb-1">Oferta (mg/kg/dia) = (mg NaCl * Mult. Diário) / Peso</p>
                                                                    <p className="bg-slate-50 p-2 rounded border border-slate-100">= ({((parseFloat(form.volNacl || 0) * 100) + (parseFloat(form.volNacl09 || 0) * 9) + (form.baseSolutionType === 'SF09' ? results.calcBase * 9 : 0)).toFixed(0)} * {multiplicadorDiario.toFixed(2)}) / {form.weight} = <strong className="text-slate-700">{e.na_mg_day.toFixed(0)} mg/kg/dia</strong></p>
                                                                </>
                                                            )}
                                                        </div>
                                                        )}

                                                        {parseFloat(form.volCa) > 0 && (
                                                        <div className="mb-2">
                                                            <p className="font-bold text-slate-700 mb-1">E. Cálcio (Gliconato 10%)</p>
                                                            {refUnit === 'mEq' ? (
                                                                <>
                                                                    <p className="text-[10px] text-slate-400 mb-1">mEq Ca = Vol Ca x 0,465 mEq/mL</p>
                                                                    <p className="bg-slate-50 p-2 rounded border border-slate-100"><strong>{(form.volCa * 0.465).toFixed(2)} mEq</strong></p>
                                                                    
                                                                    <p className="text-[10px] text-slate-400 mt-1 mb-1">Taxa Infusão Elementar (mEq/kg/h) = (mEq Ca / Tempo) / Peso</p>
                                                                    <p className="bg-slate-50 p-2 rounded border border-slate-100">= ({(form.volCa * 0.465).toFixed(2)} / {duracaoHoras.toFixed(1)}) / {form.weight} = <strong className="text-slate-700">{(e.ca_day / 24).toFixed(2)} mEq/kg/h</strong></p>
                                                                    
                                                                    <p className="text-[10px] text-slate-400 mt-1 mb-1">Oferta (mEq/kg/dia) = (mEq Ca * Mult. Diário) / Peso</p>
                                                                    <p className="bg-slate-50 p-2 rounded border border-slate-100">= ({(form.volCa * 0.465).toFixed(2)} * {multiplicadorDiario.toFixed(2)}) / {form.weight} = <strong className="text-slate-700">{e.ca_day.toFixed(2)} mEq/kg/dia</strong></p>
                                                                </>
                                                            ) : (
                                                                <>
                                                                    <p className="text-[10px] text-slate-400 mb-1">mg Gliconato de Ca = Vol Ca x 97,9 mg/mL</p>
                                                                    <p className="bg-slate-50 p-2 rounded border border-slate-100"><strong>{(form.volCa * 97.9).toFixed(1)} mg</strong></p>
                                                                    
                                                                    <p className="text-[10px] text-slate-400 mt-1 mb-1">Taxa Infusão (mg/kg/h) = (mg Gliconato / Tempo) / Peso</p>
                                                                    <p className="bg-slate-50 p-2 rounded border border-slate-100">= ({(form.volCa * 97.9).toFixed(1)} / {duracaoHoras.toFixed(1)}) / {form.weight} = <strong className="text-slate-700">{e.ca_mg_rate.toFixed(1)} mg/kg/h</strong></p>
                                                                    
                                                                    <p className="text-[10px] text-slate-400 mt-1 mb-1">Oferta (mg/kg/dia) = (mg Gliconato * Mult. Diário) / Peso</p>
                                                                    <p className="bg-slate-50 p-2 rounded border border-slate-100">= ({(form.volCa * 97.9).toFixed(1)} * {multiplicadorDiario.toFixed(2)}) / {form.weight} = <strong className="text-slate-700">{e.ca_mg_day.toFixed(0)} mg/kg/dia</strong></p>
                                                                </>
                                                            )}
                                                        </div>
                                                        )}
                                                    </div>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    )}

                                </div>
                            </main>
                        </div>
                    </div>

                    {/* --- MODAL DE DOAÇÃO PIX --- */}
                    {isPixModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm transition-opacity">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden transform transition-all">
                                
                                <div className="px-6 py-4 bg-emerald-600 flex justify-between items-center text-white">
                                    <h3 className="font-bold text-lg flex items-center gap-2">
                                        <Heart className="w-5 h-5 fill-current" /> Apoiar o Projeto
                                    </h3>
                                    <button onClick={() => { setIsPixModalOpen(false); setCopied(false); setSelectedPix(null); }} className="text-emerald-100 hover:text-white p-1 rounded transition-colors">
                                        <X className="w-6 h-6" />
                                    </button>
                                </div>
                                
                                <div className="p-6">
                                    <p className="text-sm text-slate-600 mb-5 text-center font-medium">
                                        Este projeto é mantido de forma voluntária. Se a calculadora lhe foi útil hoje, escolha um valor abaixo para contribuir via PIX. ❤️
                                    </p>
                                    
                                    <div className="grid grid-cols-3 gap-3 mb-6">
                                        <button 
                                            onClick={() => { setSelectedPix('5'); setCopied(false); }} 
                                            className={`py-3 rounded-lg border-2 font-bold text-sm transition-all ${selectedPix === '5' ? 'border-emerald-500 bg-emerald-50 text-emerald-700 scale-105' : 'border-slate-200 text-slate-500 hover:border-emerald-200 hover:bg-emerald-50/50 hover:text-emerald-600'}`}
                                        >
                                            R$ 5
                                        </button>
                                        <button 
                                            onClick={() => { setSelectedPix('10'); setCopied(false); }} 
                                            className={`py-3 rounded-lg border-2 font-bold text-sm transition-all ${selectedPix === '10' ? 'border-emerald-500 bg-emerald-50 text-emerald-700 scale-105' : 'border-slate-200 text-slate-500 hover:border-emerald-200 hover:bg-emerald-50/50 hover:text-emerald-600'}`}
                                        >
                                            R$ 10
                                        </button>
                                        <button 
                                            onClick={() => { setSelectedPix('any'); setCopied(false); }} 
                                            className={`py-3 rounded-lg border-2 font-bold text-sm transition-all ${selectedPix === 'any' ? 'border-emerald-500 bg-emerald-50 text-emerald-700 scale-105' : 'border-slate-200 text-slate-500 hover:border-emerald-200 hover:bg-emerald-50/50 hover:text-emerald-600'}`}
                                        >
                                            Outro
                                        </button>
                                    </div>

                                    {selectedPix && (
                                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 text-center animate-[fade-in_0.3s_ease-out]">
                                            <p className="text-[11px] font-bold text-slate-500 uppercase mb-2 tracking-wide">Código PIX (Copia e Cola)</p>
                                            <div className="flex gap-2">
                                                <input 
                                                    type="text" 
                                                    readOnly 
                                                    value={pixKeys[selectedPix]} 
                                                    className="w-full text-xs p-2.5 bg-white border border-slate-300 rounded-lg text-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/20" 
                                                />
                                                <button 
                                                    onClick={() => handleCopyPix(pixKeys[selectedPix])} 
                                                    className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 rounded-lg flex items-center justify-center transition-colors shadow-sm" 
                                                    title="Copiar Chave"
                                                >
                                                    {copied ? <CheckCircle className="w-5 h-5" /> : <Copy className="w-5 h-5" />}
                                                </button>
                                            </div>
                                            
                                            {copied && (
                                                <div className="mt-4 p-3 bg-emerald-100/50 border border-emerald-200 rounded-lg">
                                                    <p className="text-sm font-bold text-emerald-700 flex items-center justify-center gap-1.5">
                                                        <CheckCircle className="w-4 h-4" /> Chave copiada!
                                                    </p>
                                                    <p className="text-xs text-emerald-600 mt-1 font-medium">Muito obrigado pelo seu apoio. Faz toda a diferença! 🎉</p>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- MODAL DE REPORTAR ERROS --- */}
                    {isErrorModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm transition-opacity">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden transform transition-all">
                                
                                <div className="px-6 py-4 bg-emerald-600 flex justify-between items-center text-white">
                                    <h3 className="font-bold text-lg flex items-center gap-2">
                                        <Mail className="w-5 h-5" /> Reportar Erro
                                    </h3>
                                    <button onClick={() => setIsErrorModalOpen(false)} className="text-emerald-100 hover:text-white p-1 rounded transition-colors">
                                        <X className="w-6 h-6" />
                                    </button>
                                </div>
                                
                                <div className="p-6 text-center">
                                    <div className="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <AlertTriangle className="w-6 h-6" />
                                    </div>
                                    <p className="text-sm text-slate-600 mb-5 font-medium leading-relaxed">
                                        Percebeu alguma informação errada ou desatualizada? Comunique-nos! Assim, podemos corrigir e melhorar a ferramenta juntos.
                                    </p>
                                    
                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 mb-5">
                                        <p className="text-[11px] font-bold text-slate-500 uppercase tracking-wide mb-1">E-mail de Contato</p>
                                        <p className="text-emerald-700 font-bold select-all">abmael.andrade24@gmail.com</p>
                                    </div>

                                    <a 
                                        href="mailto:abmael.andrade24@gmail.com?subject=Sugestão/Correção%20-%20Calculadora%20TIG%20Neonatal"
                                        className="bg-emerald-600 hover:bg-emerald-700 text-white w-full py-3 rounded-lg font-bold text-sm transition-colors shadow-sm flex items-center justify-center gap-2"
                                    >
                                        <Mail className="w-4 h-4" /> Enviar E-mail
                                    </a>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const InputField = ({ label, name, value, onChange, unit, icon, placeholder, subLabel, isGlucose, compact, required }) => (
            <div className="relative">
                <div className="flex justify-between items-baseline mb-1">
                    <label htmlFor={name} className={`block font-medium text-slate-700 ${compact ? 'text-xs' : 'text-sm'}`}>{label} {required && <span className="text-red-500">*</span>}</label>
                    {subLabel && <span className="text-[10px] text-slate-400 font-mono">{subLabel}</span>}
                </div>
                <div className="relative group">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">{icon || <span className={`w-1.5 h-1.5 rounded-full ${isGlucose ? 'bg-emerald-400' : 'bg-slate-300'}`}></span>}</div>
                    <input type="number" id={name} name={name} value={value} onChange={onChange} placeholder={placeholder || "0"} step="0.1" min="0" className={`block w-full pl-8 pr-8 ${compact ? 'py-1.5 text-sm' : 'py-2'} bg-white border border-slate-200 rounded-lg text-slate-900 placeholder:text-slate-300 focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all outline-none shadow-sm group-hover:border-slate-300`} />
                    <div className="absolute inset-y-0 right-0 pr-2 flex items-center pointer-events-none"><span className="text-slate-400 text-[10px] font-medium">{unit}</span></div>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TigCalculator />);
    </script>
</body>
</html>
